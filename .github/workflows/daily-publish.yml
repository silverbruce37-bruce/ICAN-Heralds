name: Daily Publication

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create data directory
        run: mkdir -p data

      - name: Generate Daily Edition
        run: bash scripts/generate-daily.sh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Push
        run: |
          git config user.name "ICAN Heralds Bot"
          git config user.email "heralds@ican.academy"
          git add ican_news.html index.html sw.js data/ js/academy-data.js
          git diff --staged --quiet || (
            git commit -m "Daily edition: $(TZ='Asia/Manila' date +%Y-%m-%d)"
            git push
          )
