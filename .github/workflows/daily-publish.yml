name: Daily Publication

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create data directory
        run: mkdir -p data

      - name: Generate Daily Edition
        run: bash scripts/generate-daily.sh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and Push
        run: |
          git config user.name "ICAN Heralds Bot"
          git config user.email "heralds@ican.academy"
          VOL=$(cat data/volume.txt 2>/dev/null || echo "?")
          COVER=$(python3 -c "
          import json, glob
          f = sorted(glob.glob('data/daily-*.json'))[-1]
          d = json.load(open(f))
          print(d.get('cover_story',{}).get('headline_en','Daily Edition')[:60])
          " 2>/dev/null || echo "Daily Edition")
          git add ican_news.html index.html sw.js data/ js/academy-data.js
          git diff --staged --quiet || (
            git commit -m "Daily edition: $(TZ='Asia/Manila' date +%Y-%m-%d) VOL. $(printf '%02d' $VOL) — $COVER"
            git push
          )
